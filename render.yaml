# Render Blueprint for the A-Backend Express API.
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
#
# rootDir is the repo ROOT (not A-Backend) so npm workspaces can resolve the
# @ecom/shared package. The build installs deps + generates the Prisma client;
# the server runs via tsx (transpiles TS + the shared workspace at runtime).
#
# NODE_VERSION must stay >= 22: @supabase/supabase-js constructs a Realtime
# client inside every createClient() call (even though we never use realtime),
# and that constructor throws on Node < 22 without native WebSocket support.
# Do not lower this — it will crash the server on boot (see docs/DEPLOYMENT.md).
services:
  - type: web
    name: araish-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run db:generate
    startCommand: npm run start:backend
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      # ── Email — REQUIRED for OTP + order emails to work live ──
      # Prefer Resend (HTTP) — Render's free tier BLOCKS outbound SMTP ports, so
      # Gmail SMTP will time out here. Set RESEND_API_KEY and it's used automatically.
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: OTP_EXP_MIN
        value: "5"
      # ── This backend's own public URL (used for the PayFast callback) ──
      - key: BACKEND_PUBLIC_URL
        sync: false
      # ── PayFast (optional — leave blank to keep card payments in manual mode) ──
      - key: PAYFAST_MODE
        value: "sandbox"
      - key: PAYFAST_MERCHANT_ID
        sync: false
      - key: PAYFAST_SECURED_KEY
        sync: false
      - key: PAYFAST_MERCHANT_NAME
        value: "Muneeb Ki Araish"
      - key: PAYFAST_STORE_ID
        sync: false
