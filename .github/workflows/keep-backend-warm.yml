name: Keep backend warm

# Render's free tier spins the server down after ~15 min idle; the next request
# then takes 30–60s to cold-start, which is the main cause of slow first loads.
# This pings /health so the instance stays awake.
#
# SETUP: add a repository variable named BACKEND_URL
#   GitHub repo → Settings → Secrets and variables → Actions → Variables →
#   New variable: BACKEND_URL = https://<your-service>.onrender.com
#
# NOTE: GitHub's scheduler is best-effort (can lag 5–15 min) and pauses after
# 60 days of repo inactivity. For rock-solid uptime use a dedicated pinger like
# UptimeRobot or cron-job.org (free, every 5 min) pointed at <BACKEND_URL>/health.

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch: {} # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          URL="${{ vars.BACKEND_URL }}"
          if [ -z "$URL" ]; then
            echo "BACKEND_URL variable not set — skipping."
            exit 0
          fi
          echo "Pinging $URL/health"
          curl -fsS --max-time 60 "$URL/health" || echo "Ping failed (server may be waking up)."
